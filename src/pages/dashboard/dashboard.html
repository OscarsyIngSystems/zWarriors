<app-menu />

<div class="card">
  <p-table [columns]="cols" [value]="warriors" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template #header let-columns>
      <tr>
        @for (col of columns; track col) {
          <th>
            {{ col.header }}
          </th>
        }
      </tr>
    </ng-template>
    <ng-template #body let-rowData let-columns="columns">
      <tr>
        <td>
          <img [src]="" [alt]="'product.name'" class="w-24 rounded" />
        </td>
        <td>{{ 'product.name' }}</td>

        <td>
          <p-tag [value]="'raza sayan'" [severity]="getSeverity('sayan')" />
        </td>
        <td><p-progressbar [value]="50" /></td>
        <td>
          <i class="pi pi-mars"></i>
        </td>
        <td>
          <div>
            <button
              pButton
              type="button"
              icon="pi pi-pencil"
              class="p-button-rounded p-button-success mr-2"
            ></button>
            <button
              pButton
              type="button"
              icon="pi pi-eye"
              class="p-button-rounded p-button-warning"
            ></button>
          </div>
        </td>
      </tr>
    </ng-template>
    <ng-template #footer>
      <tr>
        <td colspan="6">In total there are {{ warriors ? warriors.length : 0 }} warriors.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
