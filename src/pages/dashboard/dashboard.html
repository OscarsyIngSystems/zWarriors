<app-menu />

<div class="card">
  <p-table [columns]="cols()" [value]="warriors()" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template pTemplate="header" let-columns>
      <tr>
        @for (col of columns; track col.field) {
          <th>
            {{ col.header }}
          </th>
        }
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-rowData>
      <tr>
        <td>
          <img [src]="rowData.image" [alt]="rowData.name" class="w-24 rounded" />
        </td>
        <td>{{ rowData.name }}</td>
        <td>
          <p-tag [value]="rowData.race" [severity]="getSeverity(rowData.race)" />
        </td>
        <td>
          <p-progressbar [value]="extractNumericValue(rowData.maxKi)" />
        </td>
        <td>
          @if (rowData.gender === 'Female') {
            <i class="pi pi-venus color-female"></i>
          } @else if (rowData.gender === 'Male') {
            <i class="pi pi-mars color-male"></i>
          }
        </td>
        <td>
          <div class="flex items-center gap-2">
            <p-button icon="pi pi-pencil" [rounded]="true" severity="warn" />

            <p-button icon="pi pi-eye" [rounded]="true" severity="help" />
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="footer">
      <tr>
        <td colspan="6">In total there are {{ warriors().length || 0 }} warriors.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
